name: Android — AAB

on:
  push:
    branches: [main]
    paths: ["android/**", "cards/**", ".github/workflows/android.yml"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Kartları güncelle + imzalı AAB derle
        working-directory: android
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: |
          cp ../cards/cards_core.json app/src/main/assets/
          cp ../cards/cards_ext.json  app/src/main/assets/
          cp ../cards/cards_ext2.json app/src/main/assets/
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}'
          rm -f release.keystore

      - uses: actions/upload-artifact@v4
        with:
          name: mobbing-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Play internal test kanalına yükle
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nickdegs.mobbing
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
